# docker-compose.override.yml — overrides de DESENVOLVIMENTO LOCAL.
#
# O Docker Compose carrega este arquivo AUTOMATICAMENTE em `docker compose up` (dev).
# Em PRODUÇÃO, o deploy roda `docker compose -f docker-compose.yml up` (só a base = modo
# PROD, enxuto): backend `java -jar`, frontend Next standalone, conexao `next start`.
#
# Aqui ficam as diferenças de DEV:
#   - targets `dev` (hot-reload): backend mvn spring-boot:run, frontend/conexao next dev.
#   - volumes de código-fonte (hot-reload) + maven-cache.
#   - Supabase LOCAL (IP do WSL) e domínios .local.
# Se o WSL trocar de IP no boot: exporte SUPABASE_HOST_IP=<novo ip> antes do compose up.
# (Compose MERGE: environment por chave; volumes concatenam.)

services:
  backend:
    build:
      target: dev
    volumes:
      - ./src:/app/src
      - ./pom.xml:/app/pom.xml
      - ./supabase:/app/supabase
      - maven-cache:/root/.m2
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://${SUPABASE_HOST_IP:-172.27.153.135}:54322/postgres
      - SUPABASE_JWKS_URL=http://${SUPABASE_HOST_IP:-172.27.153.135}:54321/auth/v1/.well-known/jwks.json
      - SUPABASE_URL=http://${SUPABASE_HOST_IP:-172.27.153.135}:54321
      # O GoTrue local emite iss=http://127.0.0.1:54321/auth/v1 (independente do IP de
      # alcance acima). Sem este override, o filtro JWT derivava o issuer do SUPABASE_URL
      # e rejeitava TODO token de tenant com 401 invalid_claims (stack dev inutilizável).
      - SUPABASE_ISSUER=http://127.0.0.1:54321/auth/v1
      - ADMIN_CORS_ALLOWED_ORIGINS=http://meadadigital.local,http://*.meadadigital.local,http://localhost:3000
      # Evolution LOCAL (evolution-local/docker-compose.yml, host :8086). O backend roda em
      # container → 'localhost' seria ele mesmo; alcança o host pelo host.docker.internal.
      - EVOLUTION_BASE_URL=http://host.docker.internal:8086
      # Conexão do WhatsApp pelo painel (Fase 0). A chave GLOBAL é SEGREDO — vem do ambiente
      # (.env da raiz ou export no shell), NUNCA hardcoded aqui. Vazia = recurso desligado (503),
      # o boot NÃO quebra.
      - EVOLUTION_GLOBAL_API_KEY=${EVOLUTION_GLOBAL_API_KEY:-}
      # A Evolution (outro compose) alcança o backend pelo host.docker.internal:8095.
      # O secret do webhook viaja no header apikey (não em query param).
      - EVOLUTION_WEBHOOK_URL=http://host.docker.internal:8095/webhooks/evolution

  frontend:
    build:
      target: dev
    env_file: ./frontend/.env.local
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NEXT_PUBLIC_API_URL=http://api.meadadigital.local
      - WATCHPACK_POLLING=true
      - NEXT_PUBLIC_SUPABASE_URL=http://${SUPABASE_HOST_IP:-172.27.153.135}:54321

  conexao-municipio-backend:
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://conexao-municipio.meadadigital.local

  conexao-municipio-frontend:
    command: sh -c "npm install && npm run dev"
    environment:
      NEXT_PUBLIC_API_URL: http://conexao-municipio.meadadigital.local

volumes:
  maven-cache:
