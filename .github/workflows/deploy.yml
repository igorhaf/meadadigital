# Deploy no servidor via SSH (login/senha). Dispara:
#   - automaticamente a cada push na main (rebuilda quando ha alteracao no github);
#   - manualmente pela UI/API (workflow_dispatch).
#
# O que faz no servidor: git pull (pega as mudancas) -> docker compose down ->
# docker compose up -d --build. O --build reconstroi as imagens, o que ATUALIZA as
# bibliotecas (composer/npm/mvn) sempre que ha mudanca.
#
# Pre-requisitos no servidor: Docker + Compose instalados; projeto clonado em project_dir
# (com docker-compose.yml na raiz) e, em producao, CADDYFILE_PATH=./caddy/Caddyfile.prod no .env.
#
# Secrets (Settings > Secrets and variables > Actions):
#   SERVER_SSH_HOST, SERVER_SSH_USER, SERVER_SSH_PASSWORD

name: Deploy (servidor)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      project_dir:
        description: 'Caminho do projeto no servidor (docker-compose.yml na raiz)'
        default: '/opt/meada'
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH — git pull + docker compose down + up --build
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_SSH_HOST }}
          username: ${{ secrets.SERVER_SSH_USER }}
          password: ${{ secrets.SERVER_SSH_PASSWORD }}
          command_timeout: 30m
          script: |
            set -e
            cd "${{ github.event.inputs.project_dir || '/opt/meada' }}"
            echo "== git fetch + reset --hard (traz as alteracoes; ignora drift de arquivos rastreados) =="
            git fetch origin main
            git reset --hard origin/main
            echo "== docker compose down (inclui o profile demo) =="
            docker compose -f docker-compose.yml --profile demo down
            echo "== docker compose up -d --build (base + profile demo; SEM override de dev; rebuilda + atualiza libs) =="
            docker compose -f docker-compose.yml --profile demo up -d --build
            echo "== Status =="
            docker compose -f docker-compose.yml --profile demo ps
