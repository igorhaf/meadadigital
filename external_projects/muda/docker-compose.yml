services:
  postgres:
    image: postgres:16-alpine
    container_name: muda-postgres
    environment:
      POSTGRES_DB: ${DB_DATABASE:-muda}
      POSTGRES_USER: ${DB_USERNAME:-muda}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-muda_secret}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5440:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-muda} -d ${DB_DATABASE:-muda}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - muda

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: muda-app
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - muda

  nginx:
    image: nginx:1.27-alpine
    container_name: muda-nginx
    ports:
      - "8095:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - muda

  # Optional dev-only Vite hot-reload server: `docker compose --profile dev up node`
  node:
    image: node:20-alpine
    container_name: muda-node
    working_dir: /var/www/html
    command: sh -c "npm install && npm run dev -- --host"
    volumes:
      - .:/var/www/html
    ports:
      - "5173:5173"
    profiles:
      - dev
    networks:
      - muda

volumes:
  postgres-data:

networks:
  muda:
    driver: bridge
