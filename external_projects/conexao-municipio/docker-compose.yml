services:
  db:
    image: postgres:16-alpine
    container_name: conexao-municipio-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: conexao_municipio
      POSTGRES_USER: conexao
      POSTGRES_PASSWORD: conexao_secret
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U conexao -d conexao_municipio"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: conexao-municipio-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8015
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: conexao_municipio
      DB_USERNAME: conexao
      DB_PASSWORD: conexao_secret
      LOG_CHANNEL: stderr
      CACHE_STORE: file
      SESSION_DRIVER: file
      QUEUE_CONNECTION: sync
    ports:
      - "8015:8000"
    volumes:
      - ./backend:/var/www/html
      - backend_vendor:/var/www/html/vendor
    command: sh -c "composer install --no-interaction && ([ -f .env ] || cp .env.example .env) && (grep -q '^APP_KEY=.' .env || php artisan key:generate --force) && php artisan migrate --force && php artisan db:seed --force && php artisan serve --host=0.0.0.0 --port=8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: conexao-municipio-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      API_URL: http://backend:8000
      NEXT_PUBLIC_API_URL: http://localhost:8015
    ports:
      - "3015:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev"

volumes:
  db_data:
  backend_vendor:
  frontend_node_modules:
