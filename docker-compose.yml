# docker-compose do Meada — fase 0.5 (dockerização + DevX local).
#
# Orquestra única do dev local: backend (Spring), frontend (Next), embeddings (sidecar Python)
# e caddy (proxy reverso na porta 80). O BANCO é o Supabase REMOTO (não há Postgres aqui) —
# lido do .env via env_file. Hot-reload por volumes mapeando o código-fonte.
#
# Subir:   ./scripts/meada-up.sh      (para o Apache, sobe os containers)
# Parar:   ./scripts/meada-down.sh    (derruba os containers)
#
# Notas de rede:
#  - O backend alcança o sidecar pelo NOME do serviço (embeddings:7080), não localhost
#    (dentro do container, localhost é o próprio container). Override via environment abaixo.
#  - NEXT_PUBLIC_API_URL é var de BROWSER (o navegador do usuário chama a API): aponta para
#    http://api.meadadigital.local (Caddy resolve via /etc/hosts no host). Override aqui para
#    não alterar o frontend/.env.local.
#  - ADMIN_CORS_ALLOWED_ORIGINS inclui os subdomínios de produto (senão o browser é bloqueado).

services:
  backend:
    build:
      context: .
      target: dev
    container_name: meada-backend
    env_file: .env
    environment:
      # sidecar pelo nome do serviço (não localhost — ver nota de rede).
      - KNOWLEDGE_EMBEDDING_ENDPOINT=http://embeddings:7080
      # Supabase LOCAL roda no HOST (escuta em 0.0.0.0); dentro do container 127.0.0.1 = o próprio
      # container. Usa o IP do WSL (mesmo que o frontend), alcançável do container. Sem alterar o .env.
      - SPRING_DATASOURCE_URL=jdbc:postgresql://${SUPABASE_HOST_IP:-172.27.153.135}:54322/postgres
      - SUPABASE_JWKS_URL=http://${SUPABASE_HOST_IP:-172.27.153.135}:54321/auth/v1/.well-known/jwks.json
      - SUPABASE_URL=http://${SUPABASE_HOST_IP:-172.27.153.135}:54321
      # CORS: domínio-base + os 10 subdomínios de produto + legado localhost:3000.
      # AdminCorsConfig usa setAllowedOriginPatterns → aceita curinga de subdomínio.
      # http://*.meadadigital.local cobre TODOS os subdomínios de nicho E os slugs de empresa
      # (suplementos-modelo, belezapura, ...) — necessário pro impersonate, onde o dashboard
      # abre em {slug}.meadadigital.local e chama api.meadadigital.local cross-origin.
      - ADMIN_CORS_ALLOWED_ORIGINS=http://meadadigital.local,http://*.meadadigital.local,http://localhost:3000
    ports:
      - "8095:8095"   # exposto p/ debugging host-side (o smoke E2E bate aqui direto também)
    volumes:
      - ./src:/app/src
      - ./pom.xml:/app/pom.xml
      - ./supabase:/app/supabase
      - maven-cache:/root/.m2
    extra_hosts:
      # caso o backend precise alcançar algo no host (ex.: evolution-local na 8086).
      - "host.docker.internal:host-gateway"
    networks: [meada]

  frontend:
    build:
      context: ./frontend
      target: dev
    container_name: meada-frontend
    env_file: ./frontend/.env.local
    environment:
      # var de BROWSER: o navegador chama a API via Caddy (sem porta).
      - NEXT_PUBLIC_API_URL=http://api.meadadigital.local
      # var de SERVER (SM-M / CMS público): o Next SSR chama o backend pela rede interna do compose,
      # não via Caddy (o /etc/hosts do host não existe dentro do container).
      - CMS_BACKEND_URL=http://backend:8095
      # hot-reload de FS dentro do Docker (o inotify nem sempre propaga via bind mount).
      - WATCHPACK_POLLING=true
      # Supabase LOCAL roda no HOST e escuta em 0.0.0.0; o IP do WSL funciona TANTO no browser
      # (é o próprio host) QUANTO no SSR dentro do container. Default = IP atual do WSL;
      # se o WSL trocar o IP no boot, exporte SUPABASE_HOST_IP=<novo ip> antes do compose up.
      - NEXT_PUBLIC_SUPABASE_URL=http://${SUPABASE_HOST_IP:-172.27.153.135}:54321
    ports:
      - "3000:3000"   # exposto p/ debugging host-side
    volumes:
      - ./frontend:/app
      - /app/node_modules   # volume anônimo: preserva o node_modules da imagem (não o do host)
      - /app/.next           # idem para o cache de build
    networks: [meada]
    depends_on: [backend]

  embeddings:
    build:
      context: ./docker/embedding-sidecar
    container_name: meada-embeddings
    restart: unless-stopped
    ports:
      - "7080:7080"   # exposto p/ debugging host-side
    volumes:
      # Cache do modelo HuggingFace, persistente entre rebuilds (evita re-download).
      - embedding-models:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:7080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      # start_period largo: o carregamento do modelo no boot leva alguns segundos.
      start_period: 90s
    networks: [meada]

  caddy:
    image: caddy:2-alpine
    container_name: meada-caddy
    ports:
      - "80:80"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
    networks: [meada]
    depends_on: [frontend, backend]

networks:
  meada:
    driver: bridge

volumes:
  maven-cache:
  caddy-data:
  embedding-models:
