# docker-compose do Meada — fase 0.5 (dockerização + DevX local).
#
# Orquestra única do dev local: backend (Spring), frontend (Next), embeddings (sidecar Python)
# e caddy (proxy reverso na porta 80). O BANCO é o Supabase REMOTO (não há Postgres aqui) —
# lido do .env via env_file. Hot-reload por volumes mapeando o código-fonte.
#
# Subir:   ./scripts/meada-up.sh      (para o Apache, sobe os containers)
# Parar:   ./scripts/meada-down.sh    (derruba os containers)
#
# Notas de rede:
#  - O backend alcança o sidecar pelo NOME do serviço (embeddings:7080), não localhost
#    (dentro do container, localhost é o próprio container). Override via environment abaixo.
#  - NEXT_PUBLIC_API_URL é var de BROWSER (o navegador do usuário chama a API): aponta para
#    http://api.meadadigital.local (Caddy resolve via /etc/hosts no host). Override aqui para
#    não alterar o frontend/.env.local.
#  - ADMIN_CORS_ALLOWED_ORIGINS inclui os subdomínios de produto (senão o browser é bloqueado).

services:
  backend:
    # PRODUÇÃO: target `runtime` = JRE + jar precompilado (java -jar). Leve, sem Maven.
    # DEV: docker-compose.override.yml troca pra target `dev` (JDK+Maven, mvn spring-boot:run
    # com hot-reload via volume). Assim prod é enxuto e dev mantém o hot-reload.
    build:
      context: .
      target: runtime
    container_name: meada-backend
    restart: unless-stopped
    env_file: .env
    environment:
      # sidecar pelo nome do serviço (universal dev+prod — rede interna do compose).
      - KNOWLEDGE_EMBEDDING_ENDPOINT=http://embeddings:7080
      # SPRING_DATASOURCE_URL / SUPABASE_URL / SUPABASE_JWKS_URL / ADMIN_CORS_ALLOWED_ORIGINS
      # vêm do env_file (.env): em PROD apontam pro Supabase remoto + CORS .com. Em DEV, o
      # override sobrepõe pro Supabase LOCAL (IP do WSL).
    ports:
      - "8095:8095"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks: [meada]

  frontend:
    # PRODUÇÃO: target `prod` = build Next standalone (`node server.js`). Leve, sem next dev.
    # As NEXT_PUBLIC_* são inlinadas no build → passadas por build.args (valores de prod vêm
    # do .env do compose no servidor). DEV: override troca pra target `dev` (next dev + volume).
    build:
      context: ./frontend
      target: prod
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
    container_name: meada-frontend
    restart: unless-stopped
    environment:
      # SSR chama o backend pela rede interna (universal dev+prod).
      - CMS_BACKEND_URL=http://backend:8095
    ports:
      - "3000:3000"
    networks: [meada]
    depends_on: [backend]

  # ---------------------------------------------------------------------------
  # AMBIENTE DE DEMO — MESMO código (mesma main) que o prod, mas banco Supabase SEPARADO
  # (isolado do de produção). Só sobe no deploy via `--profile demo`; o dev local ignora.
  # Auto-sincroniza a cada deploy (mesma fonte); os dados de demonstração (tenants/logins)
  # vivem no Supabase de demo e PERSISTEM entre deploys. As DEMO_* vêm do .env do servidor
  # (segredos, nunca commitados). Sem portas no host — acessível só via Caddy (demo./api-demo.).
  # ---------------------------------------------------------------------------
  demo-backend:
    profiles: [demo]
    build:
      context: .
      target: runtime
    container_name: demo-backend
    restart: unless-stopped
    env_file: .env
    environment:
      - KNOWLEDGE_EMBEDDING_ENDPOINT=http://embeddings:7080
      # override do env_file: aponta pro Supabase de DEMO (isolado do de prod) + CORS do demo.
      - SPRING_DATASOURCE_URL=${DEMO_SPRING_DATASOURCE_URL:-}
      - SPRING_DATASOURCE_USERNAME=${DEMO_SPRING_DATASOURCE_USERNAME:-}
      - SPRING_DATASOURCE_PASSWORD=${DEMO_SPRING_DATASOURCE_PASSWORD:-}
      - SUPABASE_URL=${DEMO_SUPABASE_URL:-}
      - SUPABASE_JWKS_URL=${DEMO_SUPABASE_JWKS_URL:-}
      - SUPABASE_SERVICE_ROLE_KEY=${DEMO_SUPABASE_SERVICE_ROLE_KEY:-}
      - ADMIN_CORS_ALLOWED_ORIGINS=https://demo.meadadigital.com
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks: [meada]

  demo-frontend:
    profiles: [demo]
    build:
      context: ./frontend
      target: prod
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${DEMO_NEXT_PUBLIC_SUPABASE_URL:-}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${DEMO_NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
        NEXT_PUBLIC_API_URL: ${DEMO_NEXT_PUBLIC_API_URL:-}
    container_name: demo-frontend
    restart: unless-stopped
    environment:
      - CMS_BACKEND_URL=http://demo-backend:8095
    networks: [meada]
    depends_on: [demo-backend]

  embeddings:
    build:
      context: ./docker/embedding-sidecar
    container_name: meada-embeddings
    restart: unless-stopped
    ports:
      - "7080:7080"   # exposto p/ debugging host-side
    volumes:
      # Cache do modelo HuggingFace, persistente entre rebuilds (evita re-download).
      - embedding-models:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:7080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      # start_period largo: o carregamento do modelo no boot leva alguns segundos.
      start_period: 90s
    networks: [meada]

  caddy:
    image: caddy:2-alpine
    container_name: meada-caddy
    ports:
      - "80:80"
      - "443:443"     # HTTPS em produção (dev usa auto_https off; a 443 fica ociosa)
    volumes:
      # Caddyfile por AMBIENTE: dev usa ./caddy/Caddyfile (.local); produção exporta
      # CADDYFILE_PATH=./caddy/Caddyfile.prod no .env do compose (.com + HTTPS automático).
      - ${CADDYFILE_PATH:-./caddy/Caddyfile}:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
    networks: [meada]
    depends_on: [frontend, backend, muda-nginx, semente-nginx, pindorama-nginx, framely-app, conexao-municipio-frontend]

  # ---------------------------------------------------------------------------
  # Projeto EXTERNO muda (Laravel/PHP) — external_projects/muda. Integrado ao mesmo
  # compose e à mesma rede; acessível SÓ via Caddy em http://muda.meadadigital.local
  # (sem portas expostas no host). Postgres dedicado (desacoplado do Supabase do meada).
  # ---------------------------------------------------------------------------
  muda-postgres:
    image: postgres:16-alpine
    container_name: muda-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${MUDA_DB_DATABASE:-muda}
      POSTGRES_USER: ${MUDA_DB_USERNAME:-muda}
      POSTGRES_PASSWORD: ${MUDA_DB_PASSWORD:-muda_secret}
    volumes:
      - muda-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MUDA_DB_USERNAME:-muda} -d ${MUDA_DB_DATABASE:-muda}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [meada]

  muda-app:
    build:
      context: ./external_projects/muda
      dockerfile: docker/php/Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: muda-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./external_projects/muda:/var/www/html
    # self-heal: instala vendor se faltar (deploy novo), depois php-fpm. Assets (Vite) são
    # buildados à parte (persistem no bind mount) — ver docs/DEPLOY.md.
    command: sh -c "[ -f vendor/autoload.php ] || composer install --no-dev --optimize-autoloader --no-interaction; php-fpm"
    depends_on:
      muda-postgres:
        condition: service_healthy
    networks: [meada]

  muda-nginx:
    image: nginx:1.27-alpine
    container_name: muda-nginx
    restart: unless-stopped
    volumes:
      - ./external_projects/muda:/var/www/html
      - ./external_projects/muda/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: [muda-app]
    networks: [meada]

  # ---------------------------------------------------------------------------
  # Projeto EXTERNO semente-doce (Laravel/PHP) — external_projects/semente-doce.
  # Doceria & salgaderia. Mesmo compose e mesma rede do muda; acessível SÓ via Caddy
  # em http://semente-doce.meadadigital.local (sem portas no host). Postgres dedicado.
  # ---------------------------------------------------------------------------
  semente-postgres:
    image: postgres:16-alpine
    container_name: semente-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${SEMENTE_DB_DATABASE:-semente_doce}
      POSTGRES_USER: ${SEMENTE_DB_USERNAME:-semente}
      POSTGRES_PASSWORD: ${SEMENTE_DB_PASSWORD:-semente_secret}
    volumes:
      - semente-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SEMENTE_DB_USERNAME:-semente} -d ${SEMENTE_DB_DATABASE:-semente_doce}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [meada]

  semente-app:
    build:
      context: ./external_projects/semente-doce/backend
      dockerfile: docker/php/Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: semente-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./external_projects/semente-doce/backend:/var/www/html
    # self-heal: instala vendor se faltar (deploy novo), depois php-fpm. Assets (Vite) são
    # buildados à parte (persistem no bind mount).
    command: sh -c "[ -f vendor/autoload.php ] || composer install --no-dev --optimize-autoloader --no-interaction; php-fpm"
    depends_on:
      semente-postgres:
        condition: service_healthy
    networks: [meada]

  semente-nginx:
    image: nginx:1.27-alpine
    container_name: semente-nginx
    restart: unless-stopped
    volumes:
      - ./external_projects/semente-doce/backend:/var/www/html
      - ./external_projects/semente-doce/backend/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: [semente-app]
    networks: [meada]

  # ---------------------------------------------------------------------------
  # Projeto EXTERNO pindorama (Laravel/PHP) — external_projects/pindorama.
  # Marketplace de serviços de saúde integrativa (terapeutas: agendamento, comissão,
  # cobrança da plataforma). Mesma rede do muda; acessível SÓ via Caddy em
  # http://pindorama.meadadigital.local (sem portas no host). Postgres dedicado.
  # Spec: external_projects/pindorama/docs/PINDORAMA.md
  # ---------------------------------------------------------------------------
  pindorama-postgres:
    image: postgres:16-alpine
    container_name: pindorama-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PINDORAMA_DB_DATABASE:-pindorama}
      POSTGRES_USER: ${PINDORAMA_DB_USERNAME:-pindorama}
      POSTGRES_PASSWORD: ${PINDORAMA_DB_PASSWORD:-pindorama_secret}
    volumes:
      - pindorama-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PINDORAMA_DB_USERNAME:-pindorama} -d ${PINDORAMA_DB_DATABASE:-pindorama}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [meada]

  pindorama-app:
    build:
      context: ./external_projects/pindorama
      dockerfile: docker/php/Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: pindorama-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./external_projects/pindorama:/var/www/html
    # self-heal: instala vendor se faltar (deploy novo), depois php-fpm. Assets (Vite) são
    # buildados à parte (persistem no bind mount).
    command: sh -c "[ -f vendor/autoload.php ] || composer install --no-dev --optimize-autoloader --no-interaction; php-fpm"
    depends_on:
      pindorama-postgres:
        condition: service_healthy
    networks: [meada]

  pindorama-nginx:
    image: nginx:1.27-alpine
    container_name: pindorama-nginx
    restart: unless-stopped
    volumes:
      - ./external_projects/pindorama:/var/www/html
      - ./external_projects/pindorama/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: [pindorama-app]
    networks: [meada]

  # ---------------------------------------------------------------------------
  # Projeto EXTERNO framely (Spring Boot/Java) — external_projects/framely.
  # Controle financeiro pessoal: API REST + bot de Telegram (opcional, só liga com
  # TELEGRAM_BOT_TOKEN). Banco H2 EM ARQUIVO (volume framely-data) — sem Postgres. O Spring
  # serve HTTP direto na 8090, sem nginx. Acessível SÓ via Caddy em
  # http://framely.meadadigital.local. Spec: external_projects/framely/README.md
  # ---------------------------------------------------------------------------
  framely-app:
    build:
      context: ./external_projects/framely
      dockerfile: Dockerfile
    container_name: framely-app
    restart: unless-stopped
    environment:
      - SERVER_PORT=8090
      # bot Telegram é opcional: sem token, sobe só a API REST.
      - TELEGRAM_BOT_TOKEN=${FRAMELY_TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_BOT_USERNAME=${FRAMELY_TELEGRAM_BOT_USERNAME:-}
    volumes:
      - framely-data:/app/data
    networks: [meada]

  # ---------------------------------------------------------------------------
  # Projeto EXTERNO conexao-municipio (Laravel API + Next) — external_projects/.
  # Acessível SÓ via Caddy em http://conexao-municipio.meadadigital.local
  # (path /api/* -> backend; resto -> frontend; mesma origem, sem CORS).
  # ---------------------------------------------------------------------------
  conexao-municipio-db:
    image: postgres:16-alpine
    container_name: conexao-municipio-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: conexao_municipio
      POSTGRES_USER: conexao
      POSTGRES_PASSWORD: conexao_secret
    volumes:
      - conexao-municipio-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U conexao -d conexao_municipio"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [meada]

  conexao-municipio-backend:
    build:
      context: ./external_projects/conexao-municipio/backend
      dockerfile: Dockerfile
    container_name: conexao-municipio-backend
    restart: unless-stopped
    depends_on:
      conexao-municipio-db:
        condition: service_healthy
    environment:
      # PROD por padrão; o override deixa local/debug em dev.
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: https://conexao-municipio.meadadigital.com
      DB_CONNECTION: pgsql
      DB_HOST: conexao-municipio-db
      DB_PORT: 5432
      DB_DATABASE: conexao_municipio
      DB_USERNAME: conexao
      DB_PASSWORD: conexao_secret
      LOG_CHANNEL: stderr
      CACHE_STORE: file
      SESSION_DRIVER: file
      QUEUE_CONNECTION: sync
    volumes:
      - ./external_projects/conexao-municipio/backend:/var/www/html
      - conexao-municipio-backend-vendor:/var/www/html/vendor
    command: sh -c "composer install --no-interaction && ([ -f .env ] || cp .env.example .env) && (grep -q '^APP_KEY=.' .env || php artisan key:generate --force) && php artisan migrate --force && php artisan db:seed --force && php artisan serve --host=0.0.0.0 --port=8000"
    networks: [meada]

  conexao-municipio-frontend:
    build:
      context: ./external_projects/conexao-municipio/frontend
      dockerfile: Dockerfile
    container_name: conexao-municipio-frontend
    restart: unless-stopped
    depends_on:
      - conexao-municipio-backend
    environment:
      # SSR (server-side) fala com o backend pela rede interna do compose.
      API_URL: http://conexao-municipio-backend:8000
      # var de BROWSER: mesma origem via Caddy (path /api roteia pro backend). PROD = .com;
      # o override deixa .local em dev. Inlinada no build (next build lê o env do container).
      NEXT_PUBLIC_API_URL: https://conexao-municipio.meadadigital.com
    volumes:
      - ./external_projects/conexao-municipio/frontend:/app
      - conexao-municipio-frontend-node_modules:/app/node_modules
    # PROD: build + next start (leve). DEV: override troca pra `npm run dev`.
    command: sh -c "npm install && npm run build && npm run start"
    networks: [meada]

networks:
  meada:
    driver: bridge

volumes:
  # maven-cache é só de DEV (mvn spring-boot:run) — declarado no docker-compose.override.yml.
  caddy-data:
  embedding-models:
  muda-postgres-data:
  semente-postgres-data:
  pindorama-postgres-data:
  framely-data:
  conexao-municipio-db-data:
  conexao-municipio-backend-vendor:
  conexao-municipio-frontend-node_modules:
