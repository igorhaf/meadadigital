# =============================================================================
# application.yml — Meada backend
#
# Estrutura: YAML multi-documento (--- separator).
#   - Documento RAIZ: tudo que é COMUM (datasource, hikari, webhook, server) +
#     o profile default (dev).
#   - Documentos dev/prod: SÓ o que diverge (logging + revelação de erro).
#   Não duplicar configuração comum entre profiles. O que muda em produção é o
#   VALOR das env vars (apontam para o Supabase de prod), não a estrutura do yaml.
#
# Fail-fast: todas as credenciais vêm de env var SEM default (${VAR}, nunca
#   ${VAR:-algo}). Se a env var não existir, o Spring lança erro ao resolver o
#   placeholder no startup e a APP NÃO SOBE. Sem fallback silencioso.
#   Variáveis obrigatórias: WEBHOOK_SECRET, SPRING_DATASOURCE_URL,
#   SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD.
# =============================================================================

spring:
  # Profile default: rodar local sem SPRING_PROFILES_ACTIVE cai em dev.
  # Produção sobrescreve com SPRING_PROFILES_ACTIVE=prod.
  profiles:
    active: dev

  datasource:
    # Credenciais por env var, sem default → fail-fast se ausentes.
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 10
      # Fail-fast de conexão no STARTUP. Sem isto, o Hikari inicializa o pool de
      #   forma LAZY (confirmado empiricamente: com log DEBUG, nenhuma conexão
      #   abre no boot) — e o connection-init-sql (SET ROLE service_role) só roda
      #   na 1ª query real. Consequência ruim: URL errada, role inexistente ou
      #   Supabase fora do ar só seriam descobertos no 1º webhook, não no boot.
      # initialization-fail-timeout > 0 força o pool a abrir a conexão inicial no
      #   startup; se falhar dentro de 10s, a APP NÃO SOBE (fail-fast). Isto também
      #   exercita o SET ROLE service_role no boot. 10s cobre latência de rede ao
      #   pooler do Supabase; instantâneo quando a conexão está OK.
      initialization-fail-timeout: 10000
      # connection-init-sql roda em TODA conexão nova do pool. SET ROLE é
      # session-level: persiste pela vida da conexão — atravessa transações e
      # segue quando a conexão volta ao pool (Hikari não faz DISCARD ALL/RESET
      # por default). Resultado: o backend opera SEMPRE como service_role.
      # CONTRATO DE CÓDIGO: nenhum SQL ad-hoc pode executar RESET ROLE / SET ROLE
      #   postgres — quebraria o invariante de que toda conexão é service_role.
      # Pool 5-10 sobre o Supabase Session pooler (PgBouncer). Camadas distintas:
      #   Hikari gerencia o ciclo de conexão Java (TCP, prepared statements, retry);
      #   PgBouncer multiplexa conexões cliente para um número menor de conexões
      #   backend reais ao Postgres. NÃO remover o Hikari pensando que é redundante
      #   com o pooler — são funções diferentes. Pool grande sobre pooler causa
      #   connection exhaustion, por isso 5-10 modesto.
      connection-init-sql: SET ROLE service_role

  # Shutdown graceful: drena requests em andamento antes de encerrar.
  lifecycle:
    # 20s = drain de webhook em voo (transação típica fecha em ms); abaixo do
    #   grace de 30s típico em orquestradores como K8s/systemd antes do SIGKILL.
    timeout-per-shutdown-phase: 20s

  # Desserialização tolerante do payload da Evolution (DTOs de webhook/dto).
  jackson:
    deserialization:
      # Evolution adiciona campos por versão — ignorar desconhecidos, não quebrar.
      fail-on-unknown-properties: false
      # Defesa em profundidade: primitivo que receba null da Evolution não estoura.
      fail-on-null-for-primitives: false

  # Upload de PDF da base de conhecimento (camada 5.13). Limite de 5MB por arquivo —
  #   PDFs de FAQ/manual cabem; protege contra upload abusivo (o RAG não é storage geral).
  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 6MB

# Webhook (Evolution → backend). secret (decisão 7): obrigatório, sem default —
#   sem WEBHOOK_SECRET a app não sobe; comparado em constant-time no filtro (código).
#   message-max-age-seconds: threshold do guard de frescor do WebhookService —
#   default 180s, largo o bastante para latência + clock skew, apertado para
#   rejeitar append-on-reconnect (ver RISKS.md incidente 2026-06-10).
webhook:
  secret: ${WEBHOOK_SECRET}
  message-max-age-seconds: ${WEBHOOK_MESSAGE_MAX_AGE_SECONDS:180}

# IA (Gemini). api-key e model obrigatórios (sem default) — fail-fast no
#   GeminiProvider se ausentes. O nome do modelo vigente deve ser confirmado antes
#   do deploy (ver RISKS.md "Nome do modelo Gemini vigente"). base-url tem default
#   (a API pública); nos testes é sobrescrito para o MockWebServer.
gemini:
  base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com}
  api-key: ${GEMINI_API_KEY}
  model: ${GEMINI_MODEL}

# RAG / base de conhecimento (camada 5.13). embedding-endpoint aponta para o sidecar
#   Python (docker-compose, porta 7080), que serve o modelo multilingual-e5-small.
#   read-timeout largo (60s): embeddings de muitos chunks num batch podem demorar em CPU.
knowledge:
  embedding-endpoint: ${KNOWLEDGE_EMBEDDING_ENDPOINT:http://localhost:7080}
  embedding-connect-timeout-ms: 5000
  embedding-read-timeout-ms: 60000
  chunk-size-chars: 800
  chunk-overlap-chars: 100
  max-chars-per-document: 500000

# Evolution API (envio outbound). base-url obrigatório SEM default (self-hosted,
#   não há URL pública para fallback) — fail-fast. SEM api-key/token aqui: o token
#   é PER-INSTANCE, lido via findEvolutionCredentials na hora do envio e passado
#   ao EvolutionClient.sendText. Endpoint/shape confirmados na doc oficial v2.1.1.
#   dry-run: false (default) = envia real; true = só loga (proteção de dev local
#   contra envio acidental a contatos reais — ver EvolutionClient.dryRun e RISKS.md).
evolution:
  base-url: ${EVOLUTION_BASE_URL}
  connect-timeout-ms: ${EVOLUTION_CONNECT_TIMEOUT_MS:5000}
  read-timeout-ms: ${EVOLUTION_READ_TIMEOUT_MS:30000}
  dry-run: ${EVOLUTION_DRY_RUN:false}
  # API key GLOBAL do servidor Evolution (o AUTHENTICATION_API_KEY de lá). Necessária só para
  # PROVISIONAR instância pelo painel (criar/QR/estado/webhook) — o ENVIO usa o token per-instância.
  # VAZIA = conexão pelo painel desabilitada (503 whatsapp_unavailable); o boot NÃO quebra.
  global-api-key: ${EVOLUTION_GLOBAL_API_KEY:}
  # URL pública do webhook do Meada, apontada automaticamente na instância ao conectar.
  # O secret vai no HEADER apikey (não em query param — evita vazar em access log).
  # VAZIA = o webhook não é apontado (a instância conecta, mas nada chega ao Meada) + WARN no log.
  webhook-url: ${EVOLUTION_WEBHOOK_URL:}
  # Provisionar instância (criar/QR) é mais lento que enviar texto — timeout próprio.
  instance-read-timeout-ms: ${EVOLUTION_INSTANCE_READ_TIMEOUT_MS:60000}

# Retry do OutboundService (IA + envio). max-attempts inclui a 1ª tentativa;
#   backoff-ms tem max-attempts-1 entradas (a espera ANTES de cada retry). Aqui:
#   3 tentativas, esperas de 1s e 3s. Lida via OutboundRetryProperties
#   (@ConfigurationProperties — agrega a lista YAML indexada, o que @Value não faria).
#   O teste sobrescreve com esperas curtas (1ms) via @DynamicPropertySource para
#   exercitar a exaustão sem latência real.
outbound:
  retry:
    max-attempts: 3
    backoff-ms:
      - 1000
      - 3000

# Admin (painel — camada 4.1+). super-admin-emails: CSV de emails que o filtro JWT
#   trata como super-admin (sem SELECT em public.users). cors-allowed-origins: origens
#   do frontend aceitas no CORS de /admin/**. Ambos via @ConfigurationProperties (AdminProperties).
admin:
  super-admin-emails: ${ADMIN_SUPER_ADMIN_EMAILS:}
  cors-allowed-origins: ${ADMIN_CORS_ALLOWED_ORIGINS:http://localhost:3000}

# Convites de admin extra (camada 5.16 #6). frontend-base-url compõe a inviteUrl que o
#   admin copia (FRONTEND_BASE/invite/{token}). token-validity-days é a validade do convite.
invitations:
  frontend-base-url: ${INVITATIONS_FRONTEND_BASE_URL:http://localhost:3000}
  token-validity-days: ${INVITATIONS_TOKEN_VALIDITY_DAYS:7}

# Agendamentos (camada 5.19 #63). reminder-check-ms: intervalo (fixedDelay) do ReminderJob
#   varrer os agendamentos due e mandar lembretes de 24h/2h. Grande por padrão (5min); o job
#   só age sobre linhas due, então não dispara efeitos em testes.
appointments:
  reminder-check-ms: ${APPOINTMENTS_REMINDER_CHECK_MS:300000}

# Engajamento (camada 5.21 #81). reactivation-cron: agenda (cron Spring) do ReactivationJob
#   varrer contatos sem mensagem há >= reactivation_days dias e mandar a mensagem de reativação
#   (uma vez por janela, controlado por contacts.reactivated_at). Default diário às 9h; o job só
#   age sobre empresas com reactivation_days/message configurados, então não dispara em testes.
engagement:
  reactivation-cron: ${ENGAGEMENT_REACTIVATION_CRON:0 0 9 * * *}

# Supabase. jwks-url SEM default (fail-fast): o filtro JWT do admin valida os tokens
#   ES256 contra as chaves públicas servidas neste endpoint JWKS (o Supabase migrou de
#   HS256/secret compartilhado para JWT Signing Keys assimétricas — ver JwksConfig e
#   DEVELOPMENT.md seção 4.1). Ex.: https://<ref>.supabase.co/auth/v1/.well-known/jwks.json
supabase:
  jwks-url: ${SUPABASE_JWKS_URL}
  # Dev local (STAGE=local com Supabase via CLI): o GoTrue local assina em HS256 com um
  # secret simétrico (não há JWKS/ES256). Quando jwt-secret está preenchido, o filtro JWT
  # verifica HS256 com ele em vez de ES256/JWKS. VAZIO por default → prod segue ES256/JWKS
  # intocado. Ver JwtAuthenticationFilter.
  jwt-secret: ${SUPABASE_JWT_SECRET:}
  # Base do GoTrue + service_role key, usados pela Admin API (generate_link) no
  # "entrar como empresa" do super-admin (SupabaseAdminClient). VAZIOS = recurso
  # desabilitado (503 impersonation_unavailable) — não quebra o boot.
  url: ${SUPABASE_URL:}
  # Issuer ESPERADO nos JWTs (claim iss). VAZIO = deriva de url (+/auth/v1) — prod intocado.
  # No compose dev, url aponta pro IP do WSL (alcance) mas o GoTrue local emite
  # iss=http://127.0.0.1:54321/auth/v1 — este override evita o 401 invalid_claims.
  issuer: ${SUPABASE_ISSUER:}
  service-role-key: ${SUPABASE_SERVICE_ROLE_KEY:}

server:
  port: 8080
  shutdown: graceful

---
# =============================================================================
# Profile: dev — desenvolvimento local.
#   Verboso para diagnóstico. PODE revelar mensagem/stacktrace de erro porque
#   o consumidor é o próprio desenvolvedor, não um cliente externo.
# =============================================================================
spring:
  config:
    activate:
      on-profile: dev

logging:
  level:
    com.meada: DEBUG

server:
  error:
    include-message: always
    include-stacktrace: on_param   # ?trace=true revela stacktrace sob demanda

---
# =============================================================================
# Profile: prod — produção.
#   Silencioso e fechado. NUNCA revelar mensagem ou stacktrace no corpo de erro
#   — o consumidor do endpoint é a Evolution (externa); vazar detalhe interno
#   no payload de erro é superfície de ataque e leak de implementação.
# =============================================================================
spring:
  config:
    activate:
      on-profile: prod

logging:
  level:
    com.meada: INFO

server:
  error:
    include-message: never
    include-stacktrace: never
